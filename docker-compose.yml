version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: doc_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docpassword}
      POSTGRES_DB: ${POSTGRES_DB:-doc_validator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docuser} -d ${POSTGRES_DB:-doc_validator}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - doc_network

  minio:
    image: minio/minio
    container_name: doc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - doc_network

  backend:
    build: ./backend
    container_name: doc_backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-docuser}:${POSTGRES_PASSWORD:-docpassword}@postgres:5432/${POSTGRES_DB:-doc_validator}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-user-documents}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://frontend}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - doc_network

  frontend:
    build: ./frontend
    container_name: doc_frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      VITE_API_URL: /api
    networks:
      - doc_network

volumes:
  postgres_data:
  minio_data:

networks:
  doc_network:
    driver: bridge